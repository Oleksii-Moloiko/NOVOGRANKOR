{% load static %}

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fff4d9">

    <title>
        {% if site_settings and site_settings.seo_title %}
            {{ site_settings.seo_title }}
        {% else %}
            NOVOGRANKOR — Памʼятники з натурального граніту
        {% endif %}
    </title>

    <meta
        name="description"
        content="{% if site_settings and site_settings.seo_description %}{{ site_settings.seo_description }}{% else %}Виготовлення та встановлення памʼятників з натурального граніту по всій Україні. Каталог, відео, фото робіт, консультація телефоном або у Viber.{% endif %}"
    >

    <meta property="og:type" content="website">
    <meta
        property="og:title"
        content="{% if site_settings and site_settings.seo_title %}{{ site_settings.seo_title }}{% else %}NOVOGRANKOR — Памʼятники з натурального граніту{% endif %}"
    >
    <meta
        property="og:description"
        content="{% if site_settings and site_settings.seo_description %}{{ site_settings.seo_description }}{% else %}Гранітні памʼятники, власне виробництво, доставка та встановлення по Україні.{% endif %}"
    >

    {% if site_settings and site_settings.logo %}
        <link rel="icon" href="{{ site_settings.logo.url }}">
        <meta property="og:image" content="{{ site_settings.logo.url }}">
    {% else %}
        <link rel="icon" href="{% static 'img/logo.png' %}">
    {% endif %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=58">
</head>
<body>
    <a class="skip-link" href="#main-content">Перейти до контенту</a>

    {% block content %}
    {% endblock %}

    <script src="{% static 'js/main.js' %}?v=58" defer></script>
</body>
</html>
