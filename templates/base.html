{% load static %}

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#151515">

    <title>
        {% if site_settings and site_settings.seo_title %}
            {{ site_settings.seo_title }}
        {% else %}
            NOVOGRANKOR — памʼятники з граніту від виробника
        {% endif %}
    </title>

    <meta
        name="description"
        content="{% if site_settings and site_settings.seo_description %}{{ site_settings.seo_description }}{% else %}Виготовлення памʼятників з натурального граніту від виробника. Телефон, Viber, каталог, приклади робіт, галерея, доставка та встановлення по Україні.{% endif %}"
    >

    <meta property="og:type" content="website">
    <meta
        property="og:title"
        content="{% if site_settings and site_settings.seo_title %}{{ site_settings.seo_title }}{% else %}NOVOGRANKOR — памʼятники з граніту{% endif %}"
    >
    <meta
        property="og:description"
        content="{% if site_settings and site_settings.seo_description %}{{ site_settings.seo_description }}{% else %}Прямий виробник гранітних памʼятників. Консультація телефоном або у Viber, каталог, приклади робіт, доставка та встановлення.{% endif %}"
    >

    {% if site_settings and site_settings.logo %}
        <link rel="icon" href="{{ site_settings.logo.url }}">
        <meta property="og:image" content="{{ site_settings.logo.url }}">
    {% endif %}

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=32">
</head>
<body>
    <a class="skip-link" href="#main-content">Перейти до контенту</a>

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
<script src="{% static 'js/main.js' %}?v=1" defer></script>
</body>
</html>
